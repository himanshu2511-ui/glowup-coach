# Render Blueprint — Glowup Coach
# Uses Docker for the backend (required for MediaPipe system dependencies)
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: glowup-coach-api
    runtime: docker              # Docker runtime — handles MediaPipe system deps
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true      # Render auto-generates a cryptographically secure value
      - key: DATABASE_URL
        fromDatabase:
          name: glowup-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://glowup-coach.vercel.app  # update to your actual Vercel URL
      - key: WEB_CONCURRENCY
        value: "2"               # gunicorn workers — keep low on free tier (512 MB RAM)
      - key: PORT
        value: "8000"
      - key: PYTHON_VERSION
        value: "3.11.9"

databases:
  - name: glowup-db
    plan: free                   # 90-day free PostgreSQL on Render
    databaseName: glowup
    user: glowup_admin
    region: singapore            # Change to: oregon, frankfurt, ohio as needed
